<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text Token Extractor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  background: var(--figma-color-bg);
  color: var(--figma-color-text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--figma-color-border-strong); border-radius: 4px; }

.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.empty {
  flex: 1;
  padding: 32px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
}

.empty-text { font-size: 11px; color: var(--figma-color-text-secondary); line-height: 1.5; }
.empty-hint { font-size: 11px; color: var(--figma-color-text-tertiary); }

.tokens-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

.token-section {
  padding: 8px;
  border-bottom: 1px solid var(--figma-color-border);
}

.token-section:last-child {
  border-bottom: none;
}

.card-container {
  border: 1px solid var(--figma-color-border);
  border-radius: 4px;
  overflow: hidden;
}

/* Card header: layer name + chevron */
.card-header {
  height: 32px;
  padding: 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--figma-color-bg-secondary);
  border-bottom: 1px solid var(--figma-color-border);
  flex-shrink: 0;
  cursor: pointer;
  transition: background 80ms;
}

.card-header:hover {
  background: var(--figma-color-bg-hover);
}

.card-header:active {
  background: var(--figma-color-bg-tertiary);
}

.card-header.open {
  background: var(--figma-color-bg-hover);
}

.token-layer {
  font-size: 11px;
  font-weight: 500;
  color: var(--figma-color-text-secondary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chevron-btn {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--figma-color-icon-tertiary);
  transition: color 120ms;
  padding: 0;
}

.chevron-btn svg {
  transition: transform 200ms;
}

.chevron-btn.open svg {
  transform: rotate(180deg);
}

/* Token ID row — always visible, larger and copy-friendly */
.token-id-row {
  min-height: 40px;
  padding: 0 0 0 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  border-bottom: 1px solid var(--figma-color-border);
  background: transparent;
  transition: background 80ms;
  cursor: pointer;
}

.token-id-row:hover {
  background: var(--figma-color-bg-hover);
}

.token-id-row:active {
  background: var(--figma-color-bg-tertiary);
}

.token-id-text {
  flex: 1;
  min-width: 0;
  padding: 8px 0;
}

.token-id-badge {
  display: inline-block;
  background: var(--figma-color-bg-brand);
  color: var(--figma-color-text-onbrand);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 11px;
  font-weight: 500;
  word-break: break-all;
  line-height: 1.4;
}

.token-id-copy {
  width: 32px;
  min-height: 40px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--figma-color-icon-tertiary);
  transition: color 120ms;
  padding: 0;
}

.token-id-row:hover .token-id-copy {
  color: var(--figma-color-icon);
}

.token-id-copy.ok {
  color: var(--figma-color-icon);
}

/* Modes grid */
.modes-grid {
  display: none;
  grid-template-columns: 80px 1fr auto;
}

.modes-grid.open {
  display: grid;
}

.mrow {
  display: contents;
}

.mrow:last-child > .mtag,
.mrow:last-child > .mval,
.mrow:last-child > .copy-btn { border-bottom: none; }

.mrow:hover > .mtag,
.mrow:hover > .mval,
.mrow:hover > .copy-btn { background: var(--figma-color-bg-hover); }

.mtag {
  display: flex;
  align-items: center;
  padding: 0 8px;
  min-height: 32px;
  font-size: 11px;
  font-weight: 400;
  color: var(--figma-color-text-tertiary);
  white-space: nowrap;
  border-bottom: 1px solid var(--figma-color-border);
  border-right: 1px solid var(--figma-color-border);
  transition: background 80ms;
}

.mval {
  min-width: 0;
  padding: 6px 8px;
  font-size: 11px;
  color: var(--figma-color-text);
  word-break: break-word;
  border-bottom: 1px solid var(--figma-color-border);
  display: flex;
  align-items: center;
  transition: background 80ms;
}

.copy-btn {
  width: 32px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--figma-color-border);
  color: var(--figma-color-icon-tertiary);
  transition: background 120ms, color 120ms;
  padding: 0;
}

.copy-btn:hover {
  color: var(--figma-color-icon-brand);
  background: var(--figma-color-bg-hover);
}

.copy-btn.ok {
  color: var(--figma-color-text-brand);
}

.toast {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  background: var(--figma-color-bg-brand);
  border: none;
  border-radius: 4px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 500;
  color: var(--figma-color-text-onbrand);
  opacity: 0;
  pointer-events: none;
  transition: opacity 150ms, transform 150ms;
  white-space: nowrap;
  z-index: 3;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-8px);
}

.footer {
  height: 32px;
  padding: 0 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid var(--figma-color-border);
  background: var(--figma-color-bg-secondary);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.footer a {
  font-size: 11px;
  color: var(--figma-color-text-tertiary);
  text-decoration: none;
  transition: color 120ms;
  display: flex;
  align-items: center;
  gap: 4px;
}

.footer a:hover { color: var(--figma-color-text-brand); }

.resize-handle {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 12px;
  height: 12px;
  cursor: nwse-resize;
  z-index: 10;
}

.resize-handle::after {
  content: '';
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 6px;
  height: 6px;
  border-right: 1.5px solid var(--figma-color-icon-tertiary);
  border-bottom: 1.5px solid var(--figma-color-icon-tertiary);
  opacity: 0.5;
}

</style>
</head>
<body>

<div class="body">
  <div id="content" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;"></div>
  <div class="toast" id="toast">Copied</div>
</div>

<div class="resize-handle" id="resizeHandle"></div>
<div class="footer">
  <a href="https://github.com/blakewonka/Text-token-inspector" target="_blank">blakewonka.com</a>
</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showEmpty(text, hint) {
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <p class="empty-text">${esc(text)}</p>
      <span class="empty-hint">${esc(hint)}</span>
    </div>`;
}

function copyText(text) {
  try { navigator.clipboard.writeText(text); } catch {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

const copyIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
  <rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
  <path d="M1 8V2.5A1.5 1.5 0 0 1 2.5 1H8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
</svg>`;

const chevronIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
  <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

let modeViewEnabled = false;

function showAllTokens(tokens) {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="tokens-scroll" id="tokensList">
      ${tokens.map((data, i) => `
        <div class="token-section">
          <div class="card-container">
            <div class="token-id-row">
              <span class="token-id-text"><span class="token-id-badge">${esc(data.token)}</span></span>
              <button class="token-id-copy" data-v="${esc(data.token)}" title="Copy token">${copyIcon}</button>
            </div>
            <div class="card-header" data-idx="${i}">
              <span class="token-layer">Translations</span>
              <button class="chevron-btn" data-idx="${i}" title="Show language values">${chevronIcon}</button>
            </div>
            <div class="modes-grid" id="modes-${i}">
              ${data.modes.map(m => `
                <div class="mrow">
                  <div class="mtag">${esc(m.name)}</div>
                  <div class="mval">${esc(m.value || '—')}</div>
                  <button class="copy-btn" data-v="${esc(m.value)}" title="Copy">${copyIcon}</button>
                </div>`).join('')}
            </div>
          </div>
        </div>`).join('')}
    </div>`;

  content.querySelectorAll('.card-header').forEach(header => {
    header.addEventListener('click', function() {
      const idx = this.dataset.idx;
      const grid = document.getElementById('modes-' + idx);
      const btn = this.querySelector('.chevron-btn');
      const isOpen = grid.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      this.classList.toggle('open', isOpen);
    });
  });

  content.querySelectorAll('.token-id-row').forEach(row => {
    const btn = row.querySelector('.token-id-copy');
    row.addEventListener('click', () => {
      copyText(btn.dataset.v);
      btn.classList.add('ok');
      setTimeout(() => btn.classList.remove('ok'), 900);
      showToast('Copied');
    });
  });

  content.querySelectorAll('.token-id-copy').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(btn.dataset.v);
      btn.classList.add('ok');
      setTimeout(() => btn.classList.remove('ok'), 900);
      showToast('Copied');
    });
  });

  content.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(btn.dataset.v);
      btn.classList.add('ok');
      setTimeout(() => btn.classList.remove('ok'), 900);
      showToast('Copied');
    });
  });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
}

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  switch (msg.type) {
    case 'NO_SELECTION':
      showEmpty('Select a text layer with a token', 'Works with text instances and frames');
      break;
    case 'NO_TOKEN':
      showEmpty('No variable token found', 'The selected layer has no bound text variable');
      break;
    case 'ALL_TOKENS':
      modeViewEnabled = false;
      showAllTokens(msg.payload);
      break;
    case 'NAVIGATE_FAIL':
      showToast('Main component not found');
      break;
  }
};

showEmpty('Select a text layer with a token', 'Works with text instances and frames');

(function() {
  var handle = document.getElementById('resizeHandle');
  var startX, startY, startW, startH;
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startX = e.clientX;
    startY = e.clientY;
    startW = window.innerWidth;
    startH = window.innerHeight;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onUp);
  });
  function onDrag(e) {
    var w = Math.max(500, startW + (e.clientX - startX));
    var h = Math.max(320, startH + (e.clientY - startY));
    parent.postMessage({ pluginMessage: { type: 'RESIZE', width: w, height: h } }, '*');
  }
  function onUp() {
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onUp);
  }
})();

</script>
</body>
</html>
